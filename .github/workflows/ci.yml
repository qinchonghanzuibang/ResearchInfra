name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Test
        run: python -m pytest

  package:
    name: Build and install distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel in a clean environment
        run: |
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/*.whl

      - name: Smoke test built CLI
        run: |
          .release-venv/bin/researchinfra --help
          .release-venv/bin/python -m researchinfra --help
          .release-venv/bin/researchinfra init /tmp/researchinfra-smoke
          test -f /tmp/researchinfra-smoke/.researchinfra/workspace.yaml
